      <div class="sec">
        <h5 class="sec-title" data-en="Background &amp; Motivation" data-zh="背景与动机">Background &amp; Motivation</h5>
        <p data-en="Wearable AI glasses aim to give users on-the-go dietary assistance, but this requires <strong>fine-grained food recognition</strong> and reliable <strong>nutrition estimation</strong> from a single egocentric photo. General-purpose multimodal models underperform on the long-tailed, visually similar categories typical of real meals, so a domain-adapted model and a clean data pipeline are needed."
           data-zh="可穿戴 AI 眼镜希望为用户提供随时随地的饮食辅助，但这需要从单张第一视角照片中实现<strong>细粒度食物识别</strong>与可靠的<strong>营养估算</strong>。通用多模态模型在真实餐食中常见的长尾、视觉相似类别上表现不佳，因此需要一个域适配的模型和干净的数据流水线。">
          ...</p>
      </div>

      <div class="sec">
        <h5 class="sec-title" data-en="Method &amp; My Role" data-zh="方法与我的职责">Method &amp; My Role</h5>
        <p data-en="As the <strong>core data engineer and algorithm developer</strong>, I collected large-scale food data from Baidu and official nutrition databases, and built a complete preprocessing pipeline — <strong>image-quality filtering, object detection, cropping, and deduplication</strong>. I then constructed the fine-tuning datasets and fine-tuned <strong>TeleMM-7B</strong> for food recognition and nutrition estimation, integrating it into the glasses' agent."
           data-zh="作为<strong>核心数据工程师与算法开发者</strong>，我从百度与官方营养数据库收集了大规模食物数据，并构建了完整的预处理流水线——<strong>图像质量筛选、目标检测、裁剪与去重</strong>。随后我构建了微调数据集，并对 <strong>TeleMM-7B</strong> 进行微调以完成食物识别与营养估算，并将其集成进眼镜的智能 Agent。">
          ...</p>
      </div>

  <script>
    (function () {
      const transElems = Array.from(document.querySelectorAll('[data-en]'));
      const btnEn = document.getElementById('lang-en');
      const btnZh = document.getElementById('lang-zh');
      function setLanguage(lang) {
        transElems.forEach(el => {
          const val = el.getAttribute('data-' + lang);
          if (val !== null) el.innerHTML = val;
        });
        try { localStorage.setItem('lang', lang); } catch (e) {}
        if (lang === 'en') {
          btnEn.classList.add('active','btn-primary'); btnEn.classList.remove('btn-outline-primary');
          btnZh.classList.remove('active','btn-primary'); btnZh.classList.add('btn-outline-secondary');
        } else {
          btnZh.classList.add('active','btn-primary'); btnZh.classList.remove('btn-outline-secondary');
          btnEn.classList.remove('active','btn-primary'); btnEn.classList.add('btn-outline-primary');
        }
        document.documentElement.lang = (lang === 'zh' ? 'zh' : 'en');
      }
      btnEn.addEventListener('click', () => setLanguage('en'));
      btnZh.addEventListener('click', () => setLanguage('zh'));
      const saved = (function(){ try { return localStorage.getItem('lang'); } catch (e) { return null; } })();
      setLanguage(saved || 'en');
    })();
  </script>
