      <h3 class="pub-title" data-en="Food Recognition &amp; Nutrition Estimation Agent for Wearable AI Glasses"

        Food Recognition &amp; Nutrition Estimation Agent for Wearable AI Glasses</h3>

      <p class="pub-venue">
        <em data-en="Machine Learning Engineer Intern, 2025 &nbsp;·&nbsp; TeleAI, China Telecom &nbsp;·&nbsp; with Dr. Xiangyu Chen"
            data-zh="机器学习工程实习生，2025 &nbsp;·&nbsp; 中国电信人工智能研究院（TeleAI） &nbsp;·&nbsp; 导师：陈祥宇博士">Machine Learning Engineer Intern, 2025 &nbsp;·&nbsp; TeleAI, China Telecom &nbsp;·&nbsp; with Dr. Xiangyu Chen</em>
      </p>
      <p class="pub-links">
        [<a href="https://chxy95.github.io/" target="_blank" rel="noopener" data-en="Advisor" data-zh="导师主页">Advisor</a>]
      </p>

      <hr>

      <div class="sec">
        <h5 class="sec-title" data-en="Background &amp; Motivation" data-zh="背景与动机">Background &amp; Motivation</h5>
        <p data-en="Wearable AI glasses aim to give users on-the-go dietary assistance, but this requires <strong>fine-grained food recognition</strong> and reliable <strong>nutrition estimation</strong> from a single egocentric photo. General-purpose multimodal models underperform on the long-tailed, visually similar categories typical of real meals, so a domain-adapted model and a clean data pipeline are needed."
           data-zh="可穿戴 AI 眼镜希望为用户提供随时随地的饮食辅助，但这需要从单张第一视角照片中实现<strong>细粒度食物识别</strong>与可靠的<strong>营养估算</strong>。通用多模态模型在真实餐食中常见的长尾、视觉相似类别上表现不佳，因此需要一个域适配的模型和干净的数据流水线。">
          ...</p>
      </div>

      <div class="sec">
        <h5 class="sec-title" data-en="Method &amp; My Role" data-zh="方法与我的职责">Method &amp; My Role</h5>
        <p data-en="As the <strong>core data engineer and algorithm developer</strong>, I built <strong>automated data pipelines</strong> that assembled a large-scale dataset of <strong>2M+ food image and nutrition-description pairs</strong>, drawing from web sources and official nutrition databases. The pipeline handled image-quality filtering, object detection, cropping, and deduplication, keeping the training data clean and balanced across long-tailed food categories."
           data-zh="作为<strong>核心数据工程师与算法开发者</strong>，我构建了<strong>自动化数据流水线</strong>，从网络来源与官方营养数据库汇聚了 <strong>200 万+ 食物图像与营养描述配对</strong>的大规模数据集。该流水线完成图像质量筛选、目标检测、裁剪与去重，使训练数据在长尾食物类别上保持干净且均衡。">
          ...</p>
        <p data-en="I then performed <strong>supervised fine-tuning (SFT)</strong> on a <strong>7B-parameter multimodal LLM (TeleMM-7B)</strong> so that, given a single food image, it estimates the food's <strong>calories and nutritional composition</strong>. The fine-tuned model was integrated into the glasses' on-device agent."
           data-zh="随后我对一个 <strong>70 亿参数的多模态大模型（TeleMM-7B）</strong>进行<strong>有监督微调（SFT）</strong>，使其能够根据单张食物图像估算该食物的<strong>热量与营养成分</strong>。微调后的模型被集成进眼镜的端侧智能 Agent。">
          ...</p>
      </div>

      <div class="sec">
        <h5 class="sec-title" data-en="Main Results" data-zh="主要结果">Main Results</h5>
        <p data-en="Supervised fine-tuning improved food recognition accuracy from <strong>74% to 91%</strong> and made the nutritional analysis noticeably more reliable, improving the overall user experience. The product was later <strong>commercially launched</strong>."
           data-zh="有监督微调将食物识别准确率从 <strong>74% 提升至 91%</strong>，并显著提升了营养分析的可靠性与整体用户体验。该产品后续已<strong>正式商业化落地</strong>。">
          ...</p>

  <script>
    (function () {
      const transElems = Array.from(document.querySelectorAll('[data-en]'));
      const btnEn = document.getElementById('lang-en');
      const btnZh = document.getElementById('lang-zh');
      function setLanguage(lang) {
        transElems.forEach(el => {
          const val = el.getAttribute('data-' + lang);
          if (val !== null) el.innerHTML = val;
        });
        try { localStorage.setItem('lang', lang); } catch (e) {}
        if (lang === 'en') {
          btnEn.classList.add('active','btn-primary'); btnEn.classList.remove('btn-outline-primary');
          btnZh.classList.remove('active','btn-primary'); btnZh.classList.add('btn-outline-secondary');
        } else {
          btnZh.classList.add('active','btn-primary'); btnZh.classList.remove('btn-outline-secondary');
          btnEn.classList.remove('active','btn-primary'); btnEn.classList.add('btn-outline-primary');
        }
        document.documentElement.lang = (lang === 'zh' ? 'zh' : 'en');
      }
      btnEn.addEventListener('click', () => setLanguage('en'));
      btnZh.addEventListener('click', () => setLanguage('zh'));
      const saved = (function(){ try { return localStorage.getItem('lang'); } catch (e) { return null; } })();
      setLanguage(saved || 'en');
    })();
  </script>
